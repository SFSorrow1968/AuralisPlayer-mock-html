<span id="sheet-sub" style="font-size:14px; color:var(--text-secondary);">Artist Name</span>
</div>
</div>
<div class="sheet-action" data-action="addCurrentToQueue">
<svg fill="currentColor" viewBox="0 0 24 24" width="24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zm-7-2h2v-4h4V8h-4V4h-2v4H9v2h4z"></path></svg> 
            Add to Queue
        </div>
<div class="sheet-action" data-action="playCurrentNext">
<svg fill="currentColor" viewBox="0 0 24 24" width="24"><path d="M8 5v14l11-7z"></path></svg>
            Play Next
        </div>
<div class="sheet-action" data-action="shareAndClose">
<svg fill="currentColor" viewBox="0 0 24 24" width="24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"></path></svg>
            Share Track
        </div>
<div class="sheet-action" data-action="removeAndClose" style="color:var(--sys-error);">
<svg fill="currentColor" viewBox="0 0 24 24" width="24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"></path></svg>
            Delete
        </div>
<div class="sheet-action" style="display:none;"></div>
<div class="sheet-action" style="display:none;"></div>
<div class="sheet-action" style="display:none;"></div>
</div>
<!-- Metadata Editor Sheet -->

<div class="bottom-sheet" id="metadata-editor" style="max-height:85vh; overflow-y:auto;">
  <div style="width:40px; height:4px; background:var(--border-default); border-radius:2px; margin:0 auto 20px;"></div>
  <h3 id="metadata-editor-heading" style="margin:0 0 16px; font-size:18px;">Edit Track Info</h3>
  <div style="display:flex; flex-direction:column; gap:12px;">
    <div>
      <label style="font-size:11px; color:var(--text-secondary); margin-bottom:4px; display:block; text-transform:uppercase; letter-spacing:.05em;">Title</label>
      <input id="meta-edit-title" type="text" placeholder="Track title" style="width:100%; box-sizing:border-box; background:rgba(255,255,255,0.07); border:1px solid var(--border-default); border-radius:10px; padding:10px 14px; color:var(--text-primary); font-size:15px; outline:none;">
    </div>
    <div>
      <label style="font-size:11px; color:var(--text-secondary); margin-bottom:4px; display:block; text-transform:uppercase; letter-spacing:.05em;">Artist</label>
      <input id="meta-edit-artist" type="text" placeholder="Track artist" style="width:100%; box-sizing:border-box; background:rgba(255,255,255,0.07); border:1px solid var(--border-default); border-radius:10px; padding:10px 14px; color:var(--text-primary); font-size:15px; outline:none;">
    </div>
    <div>
      <label style="font-size:11px; color:var(--text-secondary); margin-bottom:4px; display:block; text-transform:uppercase; letter-spacing:.05em;">Album Artist</label>
      <input id="meta-edit-album-artist" type="text" placeholder="e.g. Various Artists" style="width:100%; box-sizing:border-box; background:rgba(255,255,255,0.07); border:1px solid var(--border-default); border-radius:10px; padding:10px 14px; color:var(--text-primary); font-size:15px; outline:none;">
    </div>
    <div>
      <label style="font-size:11px; color:var(--text-secondary); margin-bottom:4px; display:block; text-transform:uppercase; letter-spacing:.05em;">Album</label>
      <input id="meta-edit-album" type="text" placeholder="Album title" style="width:100%; box-sizing:border-box; background:rgba(255,255,255,0.07); border:1px solid var(--border-default); border-radius:10px; padding:10px 14px; color:var(--text-primary); font-size:15px; outline:none;">
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div>
        <label style="font-size:11px; color:var(--text-secondary); margin-bottom:4px; display:block; text-transform:uppercase; letter-spacing:.05em;">Year</label>
        <input id="meta-edit-year" type="text" placeholder="YYYY" maxlength="4" style="width:100%; box-sizing:border-box; background:rgba(255,255,255,0.07); border:1px solid var(--border-default); border-radius:10px; padding:10px 14px; color:var(--text-primary); font-size:15px; outline:none;">
      </div>
      <div>
        <label style="font-size:11px; color:var(--text-secondary); margin-bottom:4px; display:block; text-transform:uppercase; letter-spacing:.05em;">Genre</label>
        <input id="meta-edit-genre" type="text" placeholder="Genre" style="width:100%; box-sizing:border-box; background:rgba(255,255,255,0.07); border:1px solid var(--border-default); border-radius:10px; padding:10px 14px; color:var(--text-primary); font-size:15px; outline:none;">
      </div>
    </div>
  </div>
  <div style="display:flex; gap:10px; margin-top:20px;">
    <button type="button" data-action="closeMetadataEditor" style="flex:1; padding:12px; background:rgba(255,255,255,0.08); border:none; border-radius:12px; color:var(--text-primary); font-size:15px; cursor:pointer;">Cancel</button>
    <button type="button" data-action="saveMetadataEdits" style="flex:2; padding:12px; background:var(--sys-primary,#7c3aed); border:none; border-radius:12px; color:#fff; font-size:15px; font-weight:700; cursor:pointer;">Save</button>
  </div>
</div>
<!-- LYRICS PANEL -->
<div id="lyrics-panel" class="lyrics-panel" style="position:fixed; inset:0; z-index:3000; background:rgba(0,0,0,0.92); color:#fff; overflow-y:auto; padding:60px 24px 40px; display:none;">
  <button data-action="toggleLyrics" style="position:fixed; top:16px; right:16px; z-index:3001; background:rgba(255,255,255,0.15); border:none; color:#fff; width:36px; height:36px; border-radius:50%; font-size:20px; cursor:pointer;" type="button">×</button>
  <h2 style="font-size:18px; font-weight:700; margin-bottom:16px; color:rgba(255,255,255,0.6);">Lyrics</h2>
  <pre id="lyrics-content" style="font-family:inherit; white-space:pre-wrap; font-size:16px; line-height:1.7; color:rgba(255,255,255,0.85);">No lyrics available</pre>
</div>
<!-- TOAST -->
<div id="toast">Notification context</div>
<!-- Swipe Edge Trigger -->
<div class="swipe-edge" id="swipe-edge"></div>
<!-- Sidebar Drawer -->
<div class="sidebar-scrim" id="sidebar-scrim" data-action="closeSidebar"></div>
<div class="sidebar" id="sidebar">
<h2>All Playlists</h2>
<div class="list-wrap" id="sidebar-playlists-list" style="background:transparent; border:none;"><div class="screen-empty-state sidebar-empty-state"><div class="screen-empty-icon"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M4 6h10v2H4V6zm0 5h10v2H4v-2zm0 5h7v2H4v-2zm13-9v8.17A3 3 0 1 0 19 18V9h3V7h-5z"></path></svg></div><strong class="screen-empty-title">No playlists yet</strong><p class="screen-empty-copy">Create one, then choose songs from your library.</p><div class="sidebar-empty-actions"><button type="button" class="sidebar-empty-action primary" data-action="createPlaylistFromSidebar">New Playlist</button><button type="button" class="sidebar-empty-action" data-action="openLibrarySongsFromSidebar">Browse Songs</button></div></div></div>
</div>
<!-- Tag Creator Modal -->

<div class="bottom-sheet" id="tag-creator" style="padding-bottom:40px;">
<div style="width:40px; height:4px; background:var(--border-default); border-radius:2px; margin:0 auto 20px;"></div>
<h3 style="margin-bottom:16px;">Create Custom Tag</h3>
<div class="dash-search" style="margin:0 0 16px; padding:12px 16px;">
<span style="color:var(--sys-primary); font-weight:800; font-size:18px;">#</span>
<input id="new-tag-input" placeholder="Tag name..." style="font-size:15px;" type="text">
</div>
<button class="btn" data-action="createTag">Create Tag</button>
</div>
<div class="image-viewer-scrim" id="image-viewer-scrim" data-action="closeImageViewerSelf">
<div aria-label="Album artwork viewer" aria-modal="true" class="image-viewer-shell" role="dialog">
<div class="image-viewer-top">
<button aria-label="Close artwork viewer" class="image-viewer-close" id="image-viewer-close" data-action="closeAlbumArtViewer" type="button">
<svg viewBox="0 0 24 24"><path d="M18.3 5.71 12 12l6.3 6.29-1.41 1.41L10.59 13.41 4.29 19.7 2.88 18.29 9.17 12 2.88 5.71 4.29 4.3l6.3 6.29 6.29-6.29z"></path></svg>
</button>
</div>
<img alt="Album artwork" class="image-viewer-art" id="image-viewer-img">
<div class="image-viewer-meta">
<div class="image-viewer-meta-title" id="image-viewer-title"></div>
<div class="image-viewer-meta-sub" id="image-viewer-sub"></div>
</div>
</div>
</div>

</div>
</body>
</html>
